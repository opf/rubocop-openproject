OpenProject/AddPreviewForViewComponent:
  Description: 'Add a preview for the ViewComponent.'
  Enabled: true
  VersionAdded: '0.1.0'

OpenProject/NoDoEndBlockWithRSpecCapybaraMatcherInExpect:
  Description: 'Use `{ .. }` syntax with Capybara rspec matchers instead of `do .. end`.'
  Enabled: true
  VersionAdded: '0.1.0'

OpenProject/NoNotImplementedError:
  Description: 'Do not raise `NotImplementedError` to signal an unimplemented abstract method.'
  Enabled: true
  VersionAdded: '0.4.0'

OpenProject/NoParamsInWorkPackageWhereId:
  Description: 'Avoid `WorkPackage.where(id: params[...])`; use `where_display_id_in` to honour semantic identifiers.'
  Enabled: true
  VersionAdded: '0.5.0'

OpenProject/NoSleepInFeatureSpecs:
  Description: 'Avoid using `sleep` greater than 1 second in feature specs.'
  Enabled: true
  VersionAdded: '0.1.0'

OpenProject/UseServiceResultFactoryMethods:
  Description: 'Use ServiceResult factory methods instead of ServiceResult.new.'
  Enabled: true
  VersionAdded: '0.1.0'
