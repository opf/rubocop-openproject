name: Release rubocop-openproject Gem

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    name: Changeset and Release
    runs-on:
      labels:
        - runs-on
        - run-id=${{ github.run_id }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.OPENRPOJECTCI_GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci

      - name: Configure Git
        run: |
          git config user.name openprojectci
          git config user.email operations+openprojectci@openproject.com

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          title: Release Tracking
          version: npm run changeset:version
          publish: script/changeset-publish
        env:
          GITHUB_TOKEN: ${{ secrets.OPENRPOJECTCI_GH_TOKEN }}
